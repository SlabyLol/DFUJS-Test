<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkFoxUtilityJS - Remote Dashboard</title>
    <style>
        :root { --primary: #10b981; --bg: #09090b; --card: #18181b; --text: #f4f4f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .card { background: var(--card); border: 1px solid #27272a; padding: 20px; border-radius: 12px; }
        h2 { color: var(--primary); margin-top: 0; }
        
        input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #27272a; margin-bottom: 10px; box-sizing: border-box; }
        input { background: #09090b; color: white; }
        button { background: var(--primary); color: #064e3b; font-weight: bold; border: none; cursor: pointer; }
        
        #chat-window { height: 300px; overflow-y: auto; background: #000; border-radius: 8px; padding: 15px; margin-bottom: 10px; font-size: 0.9rem; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 6px; }
        .user { background: #1e3a8a; text-align: right; }
        .ai { background: #27272a; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>

    <h1 style="text-align:center;">DarkFoxUtilityJS <span style="color:var(--primary)">v1.4.1 Live CDN</span></h1>

    <div class="smt-grid">
        <div class="card">
            <h2>WebAI-Label</h2>
            <label style="font-size: 0.8rem; color: #71717a;">Enter Gemini API Key:</label>
            <input type="password" id="api-key" placeholder="AIzaSy...">
            <button id="init-ai">Initialize WebAI</button>
            <hr style="border: 0.5px solid #27272a; margin: 20px 0;">
            <h3>Quick Tools</h3>
            <button id="gen-pass" style="background:#3f3f46; color:white;">Gen Secure Password</button>
            <div id="tool-out" style="font-family:monospace; color:var(--primary); margin-top:10px;"></div>
        </div>

        <div class="card">
            <h2>Adaptive Chat</h2>
            <div id="chat-window">
                <div class="ai">System: Please initialize with an API Key to start chatting.</div>
            </div>
            <input type="text" id="user-input" placeholder="Say something..." disabled>
            <button id="send-msg" disabled>Send Message</button>
        </div>
    </div>

    <script type="module">
        // FIX: Importiert den Code jetzt direkt über das CDN aus deinem anderen Repository!
        import { initSMTGrid, DFWebAI, generatePassword, foxLog } from 'https://cdn.jsdelivr.net/gh/SlabyLol/DarkFoxUtilityJS@v1.4.1/index.js';

        // Aktiviert das SMT-Grid aus der Ferne
        initSMTGrid();

        let ai = null;
        const chatWin = document.getElementById('chat-window');
        const userInp = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-msg');
        const toolOut = document.getElementById('tool-out');

        // AI Initialization
        document.getElementById('init-ai').addEventListener('click', () => {
            const key = document.getElementById('api-key').value.trim();
            if(!key) {
                alert("API Key required!");
                return;
            }
            
            try {
                ai = new DFWebAI(key);
                userInp.disabled = false;
                sendBtn.disabled = false;
                chatWin.innerHTML = '<div class="ai"><b>[Ecosystem]:</b> WebAI Online. I will adapt to your style!</div>';
                foxLog.success("AI Engine Ready via Remote CDN.");
            } catch (error) {
                foxLog.error("Failed to initialize AI: " + error.message);
                alert("Initialization failed!");
            }
        });

        // Chat Logic
        async function chat() {
            const txt = userInp.value.trim(); 
            if(!txt || !ai) return;
            
            userInp.value = '';
            chatWin.innerHTML += `<div class="user">${txt}</div>`;
            chatWin.scrollTop = chatWin.scrollHeight;
            
            const loading = document.createElement('div'); 
            loading.className = 'ai'; 
            loading.innerText = 'Thinking...';
            chatWin.appendChild(loading);
            chatWin.scrollTop = chatWin.scrollHeight;
            
            const reply = await ai.sendMessage(txt);
            loading.innerText = reply;
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        sendBtn.addEventListener('click', chat);
        userInp.addEventListener('keypress', (e) => { if(e.key === 'Enter') chat(); });
        
        // Tool Logic
        document.getElementById('gen-pass').addEventListener('click', () => {
            const newPassword = generatePassword(20);
            toolOut.innerText = newPassword;
            foxLog.success("New password generated.");
        });
    </script>
</body>
</html>
